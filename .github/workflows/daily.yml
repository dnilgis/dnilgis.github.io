name: Generate Daily Briefing

on:
  schedule:
    - cron: '45 11 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Generate daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_daily.py

      - name: Generate RSS feed
        run: python scripts/generate_rss.py

      - name: Commit and push
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/daily.json data/daily-archive/ daily/ feed.xml
          git diff --staged --quiet || git commit -m "📰 AGSIST Daily — $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
